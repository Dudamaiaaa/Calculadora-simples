<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Simples</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="calculadora">
    <input type="text" id="display" disabled aria-label="Visor da calculadora">
    <div class="botoes">
        <button class="btn-acao" data-action="clear">C</button>
   <button class="btn-acao" data-action="delete">⌫</button>
   <button class="btn-operador" data-action="operator" data-operator="/">÷</button>
   <button class="btn-operador" data-action="operator" data-operator="*">×</button>
   <button class="btn-operador" data-action="operator" data-operator="-">−</button>
   <button class="btn-operador" data-action="operator" data-operator="+">+</button>
   <button class="btn-igual" data-action="equals">=</button>
     <button class="btn-numero" data-number="7">7</button>
     <button class="btn-numero" data-number="8">8</button>
     <button class="btn-numero" data-number="9">9</button>

     <button class="btn-numero" data-number="4">4</button>
     <button class="btn-numero" data-number="5">5</button>
     <button class="btn-numero" data-number="6">6</button>

     <button class="btn-numero" data-number="1">1</button>
     <button class="btn-numero" data-number="2">2</button>
     <button class="btn-numero" data-number="3">3</button>

     <button class="btn-numero btn-zero" data-number="0">0</button>
     <button class="btn-numero" data-number=".">.</button>
   </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
